<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portaria Savana</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2744">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --primary: #1a2744;
            --secondary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background: var(--bg); color: var(--text); padding-bottom: 20px; }

        .header {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { padding: 15px; max-width: 600px; margin: auto; }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            border: none;
            background: #ddd;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .tab-btn.active { background: var(--accent); color: white; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
        }

        #historico-lista {
            font-size: 0.85rem;
        }

        .item-historico {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Portaria Savana</h1>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('entrada')">ENTRADA</button>
        <button class="tab-btn" onclick="showTab('saida')">SAÍDA</button>
        <button class="tab-btn" onclick="showTab('historico')">HISTÓRICO</button>
    </div>

    <div id="tab-entrada" class="content-tab">
        <div class="card">
            <div class="form-group">
                <label>PLACA</label>
                <input type="text" id="placa" placeholder="ABC1234" style="text-transform: uppercase">
            </div>
            <div class="form-group">
                <label>PRODUTO</label>
                <select id="produto">
                    <option value="SOJA">SOJA</option>
                    <option value="MILHO">MILHO</option>
                    <option value="FARELO">FARELO</option>
                </select>
            </div>
            <button class="btn-save" onclick="salvarEntrada()">✓ SALVAR ENTRADA</button>
        </div>
    </div>

    <div id="tab-saida" class="content-tab" style="display:none">
        <div class="card">
            <div class="form-group">
                <label>PLACA PARA SAÍDA</label>
                <input type="text" id="placa_saida" style="text-transform: uppercase">
            </div>
            <button class="btn-save" style="background: var(--danger)" onclick="salvarSaida()">BAIXA DE VEÍCULO</button>
        </div>
    </div>

    <div id="tab-historico" class="content-tab" style="display:none">
        <div class="card">
            <div id="historico-lista">Carregando dados...</div>
        </div>
    </div>
</div>

<script>
    // ALTERE AQUI PARA A SUA URL DO GOOGLE APPS SCRIPT
    const WEB_APP_URL = "SUA_URL_AQUI";

    function showTab(tab) {
        document.querySelectorAll('.content-tab').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'block';
        event.currentTarget.classList.add('active');
        if(tab === 'historico') carregarHistorico();
    }

    async function salvarEntrada() {
        const placa = document.getElementById('placa').value;
        const produto = document.getElementById('produto').value;
        
        if(!placa) return alert("Preencha a placa!");

        // Feedback visual
        const btn = event.target;
        btn.innerText = "ENVIANDO...";
        btn.disabled = true;

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ placa, produto, acao: "ENTRADA" })
            });
            alert("Registrado com sucesso!");
            document.getElementById('placa').value = "";
        } catch (e) {
            alert("Erro ao salvar!");
        } finally {
            btn.innerText = "✓ SALVAR ENTRADA";
            btn.disabled = false;
        }
    }

    // Registro do Service Worker para o PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('https://cleitonpborges-ux.github.io/Portaria-Savana/sw.js')
        .then(reg => console.log('App pronto para instalar!'))
        .catch(err => console.log('Erro no app', err));
    }
</script>

</body>
</html>
