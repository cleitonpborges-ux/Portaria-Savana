name: Gerar APK Portaria Savana

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Construir APK
        run: |
          # Prepara a pasta de configuração
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          
          # Cria o arquivo do projeto manualmente para evitar o loop de perguntas no terminal
          echo '{
            "packageId": "com.portaria.savana",
            "host": "cleitonpborges-ux.github.io",
            "name": "Portaria Savana",
            "launcherName": "Savana",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/Portaria-Savana/",
            "iconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icon-512x512.png",
            "maskableIconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icon-512x512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isWebManifestValidated": true
          }' > twa-manifest.json

          # Gera o APK final usando a configuração criada acima
          bubblewrap build --skipSigning

      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: App-Portaria-Savana
          path: ./*.apk
