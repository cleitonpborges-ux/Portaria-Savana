name: Gerar APK Portaria Savana
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Criar twa-manifest.json manualmente
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "io.github.cleitonpborges_ux.portaria_savana",
            "host": "cleitonpborges-ux.github.io",
            "name": "Portaria Savana",
            "launcherName": "Portaria Savana",
            "display": "standalone",
            "themeColor": "#FFFFFF",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#FFFFFF",
            "enableNotifications": false,
            "startUrl": "/Portaria-Savana/",
            "iconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icons/icon-512x512.png",
            "maskableIconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icons/icon-512x512.png",
            "monochromeIconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icons/icon-512x512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/",
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": [],
            "alphaDependencies": {
              "enabled": false
            },
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/manifest.json",
            "serviceWorkerUrl": null,
            "shortcuts": []
          }
          EOF

      - name: Configurar Bubblewrap (JDK e SDK)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Aceitar licenças Android SDK
        run: yes | sdkmanager --licenses || true

      - name: Construir APK
        run: bubblewrap build --skipSigning

      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: App-Portaria-Savana
          path: ./*.apk
