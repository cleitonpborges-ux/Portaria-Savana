name: Gerar APK Portaria Savana

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout do código
        uses: actions/checkout@v4.2.2

      # ── 2. Java 17 ───────────────────────────────────────────
      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node 20 ───────────────────────────────────────────
      - name: Configurar Node
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '20'

      # ── 4. Android SDK ───────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Deploy Firebase Hosting PRIMEIRO ──────────────────
      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTARIA_SAVANA }}
          channelId: live
          projectId: portaria-savana

      - name: Aguardar propagação do Firebase (30s)
        run: sleep 30

      # ── 6. Instalar dependências Capacitor ───────────────────
      - name: Instalar dependências npm
        run: npm install

      # ── 7. Criar pasta www ANTES do cap add ──────────────────
      - name: Preparar pasta www
        run: |
          mkdir -p www
          rsync -av --exclude='www' \
                    --exclude='android' \
                    --exclude='node_modules' \
                    --exclude='.git' \
                    --exclude='.github' \
                    --exclude='*.keystore' \
                    --exclude='*.yml' \
                    --exclude='*.yaml' \
                    --exclude='package*.json' \
                    --exclude='capacitor.config.json' \
                    --exclude='twa-manifest.json' \
                    --exclude='functions-index.js' \
                    --exclude='google-services.json' \
                    . www/
          echo "📁 Conteúdo de www/:"
          ls www/
          echo "✅ index.html presente: $(ls www/index.html)"

      # ── 8. Adicionar plataforma Android ─────────────────────
      - name: Adicionar Android ao Capacitor
        run: npx cap add android || echo "Android já adicionado"

      # ── 9. Sync Capacitor (copia www → android/assets) ───────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 10. Ícones do app Android ────────────────────────────
      - name: Copiar ícones Android
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            DIR="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$DIR"
            cp "icons/mipmap-${density}/ic_launcher.png"       "$DIR/ic_launcher.png"
            cp "icons/mipmap-${density}/ic_launcher_round.png" "$DIR/ic_launcher_round.png"
          done
          mkdir -p android/app/src/main/res/drawable
          cp icons/drawable/ic_stat_portaria.png android/app/src/main/res/drawable/ic_stat_portaria.png
          echo "✅ Ícones copiados"

      # ── 10b. Corrigir android:icon/roundIcon no AndroidManifest ──
      #  O Capacitor gera o manifest apontando para os ícones dele.
      #  Este passo substitui para os ícones que copiamos no passo 10.
      - name: Corrigir ícone do app no AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Substituir android:icon apontando para qualquer @mipmap/... pelo nosso
            sed -i 's|android:icon="@mipmap/[^"]*"|android:icon="@mipmap/ic_launcher"|g' "$MANIFEST"
            sed -i 's|android:roundIcon="@mipmap/[^"]*"|android:roundIcon="@mipmap/ic_launcher_round"|g' "$MANIFEST"
            echo "✅ android:icon e android:roundIcon corrigidos"
            grep -E "android:(icon|roundIcon)" "$MANIFEST" || echo "⚠️  Atributos não encontrados no manifest"
          else
            echo "❌ AndroidManifest.xml não encontrado"
          fi

      # ── 10c. Remover adaptive icons do Capacitor ──────────────
      - name: Remover adaptive icons do Capacitor
        run: |
          # O Capacitor gera ic_launcher_foreground.png em cada mipmap - e esse e o icone azul dele
          find android/app/src/main/res -name "ic_launcher_foreground.png" -delete
          echo "Removidos: ic_launcher_foreground.png"

          # Remover pasta anydpi-v26 se existir
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

          # Remover XMLs de adaptive icon
          rm -f android/app/src/main/res/values/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable/ic_launcher_foreground.xml
          rm -f android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml
          echo "OK - adaptive icons do Capacitor eliminados"
          echo "=== ic_launcher* restantes ==="
          find android/app/src/main/res -name "ic_launcher*" | sort

      # ── 10d. Diagnóstico: listar todos os recursos de ícone ─────
      - name: Diagnóstico de ícones Android
        run: |
          echo "=== MIPMAP DIRS ==="
          find android/app/src/main/res -type d -name "mipmap*" | sort
          echo ""
          echo "=== ARQUIVOS DE ÍCONE ==="
          find android/app/src/main/res -name "ic_launcher*" | sort
          echo ""
          echo "=== DRAWABLE DIR ==="
          find android/app/src/main/res -type d -name "drawable*" | sort
          find android/app/src/main/res/drawable* -type f 2>/dev/null | sort
          echo ""
          echo "=== TRECHO DO MANIFEST ==="
          grep -E "android:(icon|roundIcon|label)" android/app/src/main/AndroidManifest.xml || echo "nada encontrado"

      # ── 11. Injetar meta-data FCM no AndroidManifest ─────────
      - name: Configurar ícone de notificação no AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "com.google.firebase.messaging.default_notification_icon" "$MANIFEST"; then
              sed -i 's|</application>|    <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:resource="@drawable/ic_stat_portaria"/>\n        <meta-data android:name="com.google.firebase.messaging.default_notification_color" android:resource="@color/colorPrimary"/>\n    </application>|' "$MANIFEST"
              echo "✅ Ícone de notificação FCM configurado"
            else
              echo "ℹ️  Ícone FCM já configurado"
            fi
          else
            echo "❌ AndroidManifest.xml não encontrado"
          fi

      # ── 11b. Canal padrão FCM no AndroidManifest (rede de segurança) ──
      #  Isso diz ao Google Play Services qual canal usar quando uma
      #  notificação FCM chega e o app não especificou (ou o specify
      #  falhou por qualquer motivo). Funciona em conjunto com o canal
      #  criado nativamente no MainActivity (passo 14) — são duas
      #  camadas independentes apontando pro MESMO canal, então mesmo
      #  que uma falhe, a outra garante que a notificação nunca caia
      #  no canal genérico "Miscellaneous" do Android.
      - name: Configurar canal padrão FCM no AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ AndroidManifest.xml não encontrado"
            exit 1
          fi
          if ! grep -q "com.google.firebase.messaging.default_notification_channel_id" "$MANIFEST"; then
            sed -i 's|</application>|    <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="high_importance_channel"/>\n    </application>|' "$MANIFEST"
          fi
          if ! grep -q "com.google.firebase.messaging.default_notification_channel_id" "$MANIFEST"; then
            echo "❌ Falha ao configurar canal padrão FCM no manifest — build abortado"
            exit 1
          fi
          echo "✅ Canal padrão FCM configurado e VERIFICADO"
          grep "default_notification_channel_id" "$MANIFEST"

      # ── 12. google-services.json (FCM nativo) ────────────────
      - name: Restaurar google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          echo "✅ google-services.json restaurado"

      # ── 13. Permissão POST_NOTIFICATIONS (Android 13+) ───────
      - name: Injetar POST_NOTIFICATIONS no AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
              sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>|' "$MANIFEST"
              echo "✅ POST_NOTIFICATIONS adicionado"
            else
              echo "ℹ️  POST_NOTIFICATIONS já presente"
            fi
          else
            echo "❌ AndroidManifest.xml não encontrado"
            find . -name "AndroidManifest.xml" 2>/dev/null
          fi
          grep -q "POST_NOTIFICATIONS" "$MANIFEST" || { echo "❌ Falha ao injetar POST_NOTIFICATIONS — build abortado"; exit 1; }

      # ── 14. Canal FCM high_importance_channel (MainActivity nativo) ──
      #  IMPORTANTE: o MainActivity.java que o Capacitor gera por padrão
      #  é só "public class MainActivity extends BridgeActivity {}" —
      #  SEM onCreate() sobrescrito. Por isso não dá pra usar sed
      #  procurando "super.onCreate(...)" (não existe essa linha pra
      #  achar, e o sed falha em silêncio sem dar erro). A solução é
      #  reescrever o arquivo inteiro de forma determinística, sempre,
      #  e depois VERIFICAR que o resultado tem o que precisa —
      #  se não tiver, o build quebra aqui em vez de gerar um APK
      #  silenciosamente sem push funcionando.
      - name: Injetar canal FCM de alta prioridade
        run: |
          MAIN_ACTIVITY=$(find android -name "MainActivity.java" | head -1)
          if [ -z "$MAIN_ACTIVITY" ]; then
            echo "❌ MainActivity.java não encontrado"
            exit 1
          fi
          echo "📄 MainActivity: $MAIN_ACTIVITY"
          echo "--- conteúdo original ---"
          cat "$MAIN_ACTIVITY"

          PACKAGE_LINE=$(grep -m1 '^package ' "$MAIN_ACTIVITY")
          if [ -z "$PACKAGE_LINE" ]; then
            echo "❌ Não encontrei a linha 'package ...;' no MainActivity.java — build abortado"
            exit 1
          fi

          cat > "$MAIN_ACTIVITY" <<EOF
          ${PACKAGE_LINE}

          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.os.Build;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          "high_importance_channel",
                          "Portaria Savana",
                          NotificationManager.IMPORTANCE_HIGH
                      );
                      channel.setDescription("Notificações de chamadas e entradas");
                      channel.enableVibration(true);
                      channel.setShowBadge(true);
                      channel.setLockscreenVisibility(android.app.Notification.VISIBILITY_PUBLIC);
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }
          }
          EOF

          echo "--- conteúdo novo ---"
          cat "$MAIN_ACTIVITY"

          # Verificação obrigatória — se isso falhar, o build quebra AQUI,
          # nunca mais silenciosamente num APK sem push.
          if ! grep -q "createNotificationChannel" "$MAIN_ACTIVITY"; then
            echo "❌ Falha ao injetar canal FCM — build abortado"
            exit 1
          fi
          if ! grep -q "high_importance_channel" "$MAIN_ACTIVITY"; then
            echo "❌ channelId não encontrado após injeção — build abortado"
            exit 1
          fi
          echo "✅ Canal high_importance_channel injetado e VERIFICADO"

      # ── 15. Restaurar Keystore ────────────────────────────────
      - name: Restaurar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > portaria-savana.keystore
          echo "✅ Keystore restaurada"

      # ── 16. Build APK release ────────────────────────────────
      - name: Build APK release
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          echo "📦 APKs gerados:"
          find . -name "*.apk" 2>/dev/null

      # ── 17. Assinar APK ──────────────────────────────────────
      - name: Assinar APK com apksigner
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK encontrado: $APK"
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ./portaria-savana.keystore \
            --ks-pass env:KS_PASS \
            --key-pass env:KEY_PASS \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            "$APK"
          cp "$APK" ./portaria-savana-signed.apk
          echo "✅ APK assinado"

      # ── 18. Upload do APK ────────────────────────────────────
      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4.6.0
        with:
          name: App-Portaria-Savana
          path: ./portaria-savana-signed.apk
