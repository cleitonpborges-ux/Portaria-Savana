name: Gerar APK Portaria Savana
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4.2.2

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '24'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Bubblewrap e Firebase CLI
        run: npm install -g @bubblewrap/cli firebase-tools

      - name: Criar twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "io.github.cleitonpborges_ux.portaria_savana",
            "host": "portaria-savana.web.app",
            "name": "Portaria Savana",
            "launcherName": "Portaria",
            "display": "standalone",
            "themeColor": "#0f2040",
            "navigationColor": "#0f2040",
            "navigationColorDark": "#0f2040",
            "navigationDividerColor": "#0f2040",
            "navigationDividerColorDark": "#0f2040",
            "backgroundColor": "#0f2040",
            "enableNotifications": true,
            "startUrl": "/index.html",
            "iconUrl": "https://portaria-savana.web.app/icons/icon-512.png",
            "maskableIconUrl": "https://portaria-savana.web.app/icons/icon-512.png",
            "monochromeIconUrl": "https://portaria-savana.web.app/icons/icon-192.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./portaria-savana.keystore",
              "alias": "portaria"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://portaria-savana.web.app/",
            "minSdkVersion": 21,
            "orientation": "portrait",
            "fingerprints": [
              {
                "type": "SHA256",
                "value": "6F:EA:7A:3D:30:8F:5E:6D:BF:78:94:18:95:61:5C:66:65:25:61:54:AE:F1:3A:DC:6E:C0:C7:B4:E3:F7:6B:1D"
              }
            ],
            "alphaDependencies": { "enabled": false },
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://portaria-savana.web.app/manifest.json",
            "serviceWorkerUrl": null,
            "shortcuts": []
          }
          EOF

      - name: Configurar Bubblewrap com SDK do Actions
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Restaurar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > portaria-savana.keystore

      - name: Gerar projeto Android
        run: |
          sudo apt-get install -y expect
          expect << EOF || true
          spawn bubblewrap update
          expect "*(Y/n)*"
          send "y\r"
          expect eof
          EOF

      - name: Injetar POST_NOTIFICATIONS no AndroidManifest
        run: |
          MANIFEST="app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
              sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>|' "$MANIFEST"
              echo "✅ POST_NOTIFICATIONS adicionado"
            else
              echo "ℹ️  POST_NOTIFICATIONS já presente"
            fi
            grep "uses-permission" "$MANIFEST"
          else
            echo "❌ AndroidManifest.xml não encontrado"
            find . -name "AndroidManifest.xml" 2>/dev/null
          fi

      - name: Construir APK não assinado
        run: |
          printf "n\n" | bubblewrap build --skipSigning 2>/dev/null || true
          ls ./app/build/outputs/apk/release/ || echo "APK não encontrado"

      - name: Assinar APK com apksigner
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          APK=$(find ./app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK encontrado: $APK"
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks ./portaria-savana.keystore \
            --ks-pass env:KS_PASS \
            --key-pass env:KEY_PASS \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            "$APK"
          cp "$APK" ./portaria-savana-signed.apk
          echo "✅ APK assinado"

      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4.6.0
        with:
          name: App-Portaria-Savana
          path: ./portaria-savana-signed.apk

      # ── Deploy automático Firebase Hosting ──────────────────────────
      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTARIA_SAVANA }}
          channelId: live
          projectId: portaria-savana
