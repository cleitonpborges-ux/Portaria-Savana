name: Gerar APK Portaria Savana

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Construir APK
        run: |
          # 1. Inicializa o projeto PWA baseado no seu link
          bubblewrap init --manifest=https://cleitonpborges-ux.github.io/Portaria-Savana/manifest.json --yes
          
          # 2. Configura os caminhos do Android SDK e JDK automaticamente para o robô não perguntar
          echo "jks:
            path: ./android.keystore
            password: 'password'
            keyPassword: 'password'
            alias: 'android'
          jdkPath: /usr/lib/jvm/temurin-17-jdk-amd64
          androidSdkPath: /usr/local/lib/android/sdk" > tetherys.json

          # 3. Roda o Build final sem pedir assinatura
          bubblewrap build --skipSigning

      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: App-Portaria-Savana
          path: ./*.apk
