name: Gerar APK Portaria Savana

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Construir APK
        run: |
          # 1. Cria a pasta de configuração
          mkdir -p ~/.bubblewrap
          
          # 2. Usa o comando 'doctor' para validar os caminhos antes do build
          # Isso ajuda o Bubblewrap a se localizar no servidor
          bubblewrap doctor || true
          
          # 3. Cria o arquivo de configuração usando os caminhos oficiais do GitHub Actions
          echo "{\"jdkPath\":\"/usr/lib/jvm/temurin-17-jdk-amd64\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json
          
          # 4. Cria o arquivo do projeto
          echo '{
            "packageId": "com.portaria.savana",
            "host": "cleitonpborges-ux.github.io",
            "name": "Portaria Savana",
            "launcherName": "Savana",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/Portaria-Savana/",
            "iconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icon-512x512.png",
            "maskableIconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icon-512x512.png",
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "webManifestUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/manifest.json",
            "generatorApp": "bubblewrap-cli"
          }' > twa-manifest.json

          # 5. Roda o Build final pulando a assinatura
          bubblewrap build --skipSigning

      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: App-Portaria-Savana
          path: ./*.apk
