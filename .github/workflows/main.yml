name: Gerar APK Portaria Savana

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Construir APK
        run: |
          # 1. Cria a pasta de configuração que o Bubblewrap exige
          mkdir -p ~/.bubblewrap
          
          # 2. Cria o arquivo de configuração com os caminhos exatos do servidor
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          
          # 3. Inicializa o projeto (o comando 'yes' garante que ele aceite tudo)
          yes | bubblewrap init --manifest=https://cleitonpborges-ux.github.io/Portaria-Savana/manifest.json --yes
          
          # 4. Gera o APK pulando a assinatura
          bubblewrap build --skipSigning

      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: App-Portaria-Savana
          path: ./*.apk
