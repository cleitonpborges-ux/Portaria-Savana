name: Gerar APK Portaria Savana
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Criar twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "io.github.cleitonpborges_ux.portaria_savana",
            "host": "cleitonpborges-ux.github.io",
            "name": "Portaria Savana",
            "launcherName": "Portaria",
            "display": "standalone",
            "themeColor": "#0f2040",
            "navigationColor": "#0f2040",
            "navigationColorDark": "#0f2040",
            "navigationDividerColor": "#0f2040",
            "navigationDividerColorDark": "#0f2040",
            "backgroundColor": "#0f2040",
            "enableNotifications": false,
            "startUrl": "/Portaria-Savana/index.html",
            "iconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icons/icon-512.png",
            "maskableIconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icons/icon-512.png",
            "monochromeIconUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/icons/icon-192.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/",
            "minSdkVersion": 19,
            "orientation": "portrait",
            "fingerprints": [],
            "alphaDependencies": { "enabled": false },
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://cleitonpborges-ux.github.io/Portaria-Savana/manifest.json",
            "serviceWorkerUrl": null,
            "shortcuts": []
          }
          EOF

      - name: Configurar Bubblewrap com SDK do Actions
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Construir APK
        run: |
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const content = fs.readFileSync('twa-manifest.json');
            const hash = crypto.createHash('sha256').update(content).digest('hex');
            fs.writeFileSync('.checksum', hash);
          "
          bubblewrap build --skipSigning

      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: App-Portaria-Savana
          path: ./*.apk
