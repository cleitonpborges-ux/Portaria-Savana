name: Gerar APK Portaria Savana

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Construir APK
        # Link atualizado para o repositório Portaria-Savana
        run: |
          bubblewrap init --manifest=https://cleitonpborges-ux.github.io/Portaria-Savana/manifest.json --yes
          bubblewrap build --skipSigning

      - name: Salvar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: App-Portaria-Savana
          path: ./*.apk
